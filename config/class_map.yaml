# ADE20K -> 0..6 (uint8) + ignore(255)
#
# IMPORTANT:
# - ann_dir/ に保存されるラベルPNGは「見た目がほぼ真っ黒」になります。
# - ピクセル値そのものがクラスIDです (0..7, 255=ignore)
#
# You can edit this file while the GUI is running; restart to reload.

ignore_id: 255
unmapped: 6     # 0..6 (send everything else to a class) or 255(ignore)

classes:
  0:
    name: sky
    ade20k:
      - sky
  1:
    name: ceiling
    ade20k:
      - ceiling
      - canopy
      - awning
  2:
    name: facade
    ade20k:
      - building
      - house
      - skyscraper
  3:
    name: path
    ade20k:
      - floor
      - sidewalk
      - path
      - rug
  4:
    name: avoid_area
    ade20k:
      # environment / terrain
      - road
      - grass
      - earth
      - field
      - sand
      - mountain
      - hill
      - rock
      - tree
      - plant

      # level changes / structures
      - wall
      - stairs
      - stairway
      - step
      - fence
      - railing
      - column
      - pole

      # obstacles / street furniture
      - door
      - screen door
      - car
      - truck
      - bus
      - van
      - minibike
      - bicycle
      - bench
      - chair
      - table
      - signboard
      - traffic light
      - streetlight
      - ashcan
      - sculpture
  5:
    name: person
    ade20k:
      - person
  6:
    name: unlabeled
    ade20k:
      - windowpane
      - curtain
      - cushion
      - lamp

