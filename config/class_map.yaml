# FastSAM prompt -> 0..5 (uint8) + ignore(255)
#
# IMPORTANT:
# - ann_dir/ に保存されるラベルPNGは「見た目がほぼ真っ黒」になります。
# - ピクセル値そのものがクラスIDです (0..5, 255=ignore)
#
# You can edit this file while the GUI is running; restart to reload.

# Prompt mapping:
# - `prompts:` は自由なテキストです（ADE20Kのラベル名と一致する必要はありません）。
# - 1クラスに複数プロンプトを設定できます。

ignore_id: 255
unmapped: 4     # 0..5 (send everything else to this class) or 255(ignore)

classes:
  0:
    name: sky
    prompts:
      - sky
      - blue sky
      - cloudy sky
      - outdoor sky
  1:
    name: ceiling
    prompts:
      - ceiling
      - indoor ceiling
      - ceiling panel
      - roof ceiling
  2:
    name: gnss_candidate
    prompts:
      # Places you may want to move toward to regain GNSS:
      # - main building entrance (not emergency/fire doors)
      # - outdoor open spaces such as plazas/courtyards
      - main entrance
      - front entrance
      - building entrance
      - entrance
      - lobby entrance
      - automatic door
      - automatic sliding door
      - glass entrance
      - entrance gate
      - plaza
      - outdoor plaza
      - courtyard
      - outdoor square
      - open area
      - open outdoor space
  3:
    name: traversable
    prompts:
      - sidewalk
      - pavement
      - walkway
      - path
      - campus path
      - floor
      - tile floor
      - concrete floor
      - ramp
      - slope
  4:
    name: no_go
    prompts:
      # areas the robot should NOT drive on
      - road
      - street
      - asphalt road
      - vehicle road
      - parking lot
      - driveway
      - grass
      - lawn
      - dirt
      - mud
      - sand
      - puddle
      - water
      - wet floor
      - stairs
      - staircase
      - step

      # fixed structures / anchored objects
      - wall
      - door
      - fence
      - railing
      - curb
      - pole
      - column
      - tree
      - plant
      - rock
  5:
    name: person
    prompts:
      - person
      - human
      - pedestrian
      - people
      - man
      - woman
      - child

