# FastSAM prompt -> 0..5 (uint8) + ignore(255)
#
# IMPORTANT:
# - ann_dir/ に保存されるラベルPNGは「見た目がほぼ真っ黒」になります。
# - ピクセル値そのものがクラスIDです (0..5, 255=ignore)
#
# You can edit this file while the GUI is running; restart to reload.

# Prompt mapping:
# - `prompts:` は自由なテキストです（ADE20Kのラベル名と一致する必要はありません）。
# - 1クラスに複数プロンプトを設定できます。

ignore_id: 255
unmapped: 4     # 0..5 (send everything else to this class) or 255(ignore)

classes:
  0:
    name: 空
    prompts:
      - sky
      - blue sky
      - cloudy sky
      - outdoor sky
  1:
    name: 天井
    prompts:
      - ceiling
      - indoor ceiling
      - ceiling panel
      - roof ceiling
  2:
    name: 建物外観
    prompts:
      - building exterior
      - building facade
      - house exterior
      - storefront
      - exterior wall
  3:
    name: 走行可能
    prompts:
      - sidewalk
      - pavement
      - walkway
      - path
      - campus path
      - floor
      - tile floor
      - concrete floor
      - ramp
      - slope
  4:
    name: 走行禁止
    prompts:
      # areas the robot should NOT drive on
      - road
      - street
      - asphalt road
      - vehicle road
      - parking lot
      - driveway
      - grass
      - lawn
      - dirt
      - mud
      - sand
      - puddle
      - water
      - wet floor
      - stairs
      - staircase
      - step

      # fixed structures / anchored objects
      - wall
      - door
      - fence
      - railing
      - curb
      - pole
      - column
      - tree
      - plant
      - rock
  5:
    name: 人
    prompts:
      - person
      - human
      - pedestrian
      - people
      - man
      - woman
      - child

