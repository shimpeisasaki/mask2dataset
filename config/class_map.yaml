# ADE20K -> 0..4 (uint8) + ignore(255)
#
# IMPORTANT:
# - ann_dir/ に保存されるラベルPNGは「見た目がほぼ真っ黒」になります。
# - ピクセル値そのものがクラスIDです (0..4, 255=ignore)
#
# You can edit this file while the GUI is running; restart to reload.

ignore_id: 255
unmapped: 4     # 0..4 (send everything else to a class) or 255(ignore)

classes:
  0:
    name: person
    ade20k:
      - person
  1:
    name: avoid
    ade20k:
      - parking lot
      - driveway
      - building
      - house
      - skyscraper
      - grass
      - earth
      - field
      - sand
      - mountain
      - hill
      - rock
      - wall
      - stairs
      - stairway
      - step
      - fence
      - railing
      - column
      - pole
      - door
      - screen door
      - tree
      - plant
  2:
    name: path
    ade20k:
      - road
      - street
      - sidewalk
      - path
      - floor
      - tile floor
      - concrete floor
      - parking lot
      - driveway
  3:
    name: sky
    ade20k:
      - sky
  4:
    name: unlabeled
    ade20k: []

# Notes:
# - ceiling and moving obstacles are intentionally left out of explicit ADE20K lists.
# - anything unmapped falls back to `unlabeled`.
