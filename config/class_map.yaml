# ADE20K -> 0..5 (uint8) + ignore(255)
#
# IMPORTANT:
# - ann_dir/ に保存されるラベルPNGは「見た目がほぼ真っ黒」になります。
# - ピクセル値そのものがクラスIDです (0..5, 255=ignore)
#
# You can edit this file while the GUI is running; restart to reload.

ignore_id: 255
unmapped: 5     # 0..5 (send everything else to a class) or 255(ignore)

classes:
  0:
    name: person
    ade20k:
      - person
  1:
    name: avoid
    ade20k:
      - wall
      - grass
      # - earth
      - door
      - water
      - field
      - fence
      - railing
      - column
      - sand
      - stairs
      - runway
      - stairway
      - pole
      - escalator
      - step
      - road
  2:
    name: path
    ade20k:
      - floor
      # - road
      - sidewalk
      - rug
      - path
      - earth
  3:
    name: sky
    ade20k:
      - sky
  4:
    name: outdoor
    ade20k:
      - building
      - tree
      - plant
      - skyscraper
  5:
    name: unlabeled
    ade20k: []


